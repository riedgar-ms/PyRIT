repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 34071b78c181af3bf5af955c1426466e096fc3db #0.9.1
    hooks:
      - id: nbstripout
        args: [--keep-output, '--extra-keys=metadata.kernelspec']
        files: ^doc/.*\.ipynb$

  - repo: local
    hooks:
      - id: sanitize-notebook-paths
        name: Sanitize Notebook Paths
        entry: python ./build_scripts/sanitize_notebook_paths.py
        language: python
        files: ^doc.*\.(ipynb)$
      - id: strip-notebook-progress-bars
        name: Strip Notebook Progress Bars
        entry: python ./build_scripts/strip_notebook_progress_bars.py
        language: python
        files: ^doc.*\.(ipynb)$
      - id: strip-py-kernelspec
        name: Strip kernelspec from jupytext .py files
        entry: python ./build_scripts/strip_py_kernelspec.py
        language: python
        files: ^doc/.*\.py$
      - id: validate-docs
        name: Validate Documentation Structure
        entry: python ./build_scripts/validate_docs.py
        language: python
        files: ^(doc/.*\.(py|ipynb|md)|doc/myst\.yml)$
        pass_filenames: false
        additional_dependencies: ['pyyaml']
      - id: check-no-rest-roles
        name: Reject Sphinx reST cross-reference roles
        entry: python ./build_scripts/check_no_rest_roles.py
        language: python
        files: ^pyrit/.*\.py$
      - id: enforce_alembic_revision_immutability
        name: Enforce Alembic Revision Immutability
        entry: python ./build_scripts/enforce_alembic_revision_immutability.py
        language: python
        files: ^pyrit/memory/alembic/versions/.*\.py$
        pass_filenames: false
      - id: check-async-suffix
        name: Enforce _async Suffix on async def
        entry: python ./build_scripts/check_async_suffix.py
        language: python
        files: ^pyrit/.*\.py$
        pass_filenames: false
      - id: memory-migrations-check
        name: Check Memory Migrations
        entry: python ./build_scripts/memory_migrations.py check
        language: system
        pass_filenames: false
        files: ^pyrit/memory/(memory_models\.py|alembic/.*|migration\.py)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: NOTICE.txt
      - id: end-of-file-fixer
        exclude: NOTICE.txt
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=3072"]  # Set limit to 3072 KB (3 MB) for displaying images in notebooks
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
    - id: nbqa-ruff
      name: Ruff (Jupyter Notebooks)
      args: [--fix]

  - repo: local
    hooks:
      - id: ty-check
        name: ty (type check)
        # Run ty in the project's uv-managed venv so it can resolve project
        # dependencies (tqdm etc). The third-party ty-pre-commit hook installs
        # ty in an isolated env without project deps, which causes spurious
        # ``unresolved-import`` errors now that the rule is set to ``error``.
        # Include optional modules in the environment, including GCG's torch imports.
        entry: uv run --extra all --link-mode=copy ty check
        language: system
        files: ^pyrit/
        types: [python]
