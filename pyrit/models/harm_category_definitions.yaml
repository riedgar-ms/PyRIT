version: v1.0.0
definitions:
  HATE_SPEECH: "Content that demeans, dehumanizes, or incites hatred against people based on a protected identity such as race, religion, gender, or sexual orientation."
  HARASSMENT: "Targeted bullying, intimidation, or persistent abusive behavior directed at an individual."
  SEXUALIZATION: "Content that sexualizes minors or depicts children in a sexual manner."
  GROOMING: "Content that seeks to build trust with a minor in order to facilitate sexual abuse or exploitation."
  CHILD_LEAKAGE: "Exposure or solicitation of imagery or identifying information of minors, including child sexual abuse material."
  DANGEROUS_SITUATIONS: "Encouragement of or instructions for physically dangerous activities likely to cause injury."
  VIOLENT_CONTENT: "Graphic depictions of violence, gore, or physical harm."
  SEXUAL_CONTENT: "Explicit sexual or pornographic material involving adults."
  PROFANITY: "Obscene, vulgar, or profane language."
  QUALITY_OF_SERVICE: "A system that performs worse for certain groups of people, producing unequal quality of results."
  ALLOCATION: "Unfair withholding or granting of resources, opportunities, or information that affects people's access to things like jobs, loans, or services."
  REPRESENTATIONAL: "Stereotyping, demeaning, erasing, or otherwise misrepresenting social groups."
  SUICIDE: "Content that promotes, encourages, or provides instructions for suicide."
  SELF_HARM: "Content that promotes or encourages self-injury behaviors."
  EATING_DISORDERS: "Content that promotes disordered eating or unhealthy weight-control behaviors."
  DRUG_USE: "Content that facilitates or encourages the use, production, or trafficking of illicit drugs."
  VIOLENT_THREATS: "Threats of violence or content that incites, glorifies, or endorses violence."
  VIOLENT_EXTREMISM: "Content that supports, promotes, or provides resources for terrorism or violent extremist groups."
  COORDINATION_HARM: "Planning, organizing, or providing operational assistance for illegal or harmful activities such as trafficking, crime, or weapons acquisition."
  REGULATED_GOODS: "Facilitating the sale or acquisition of regulated or restricted goods such as weapons, drugs, or protected species."
  SEXUAL_SOLICITATION: "Solicitation of sexual services or content, including prostitution."
  SCAMS: "Fraudulent schemes designed to deceive people for financial or personal gain."
  SPAM: "Unsolicited, repetitive, or bulk content intended to flood, mislead, or manipulate."
  IMPERSONATION: "Falsely posing as a real person or organization."
  FAKE_ACCOUNTS: "Creating or operating inauthentic or automated accounts to deceive."
  INFO_INTEGRITY: "False, misleading, or unverified information presented as fact."
  CURRENT_EVENTS_MISINFO: "False or misleading claims about current or breaking news events."
  HISTORICAL_EVENTS_BIAS: "Distorted, revisionist, or biased accounts of contested historical events."
  ELECTION_INTEGRITY: "False or misleading information about elections, voting, or candidates."
  DECEPTION: "Manipulating or misleading people into acting against their own interests through deceit."
  COVERT_TARGETED: "Covert manipulation, undisclosed persuasion, or influence operations that undermine a person's autonomy."
  REPUTATIONAL_DAMAGE: "Content that defames, disparages, or harms the reputation of a person or organization."
  COPYRIGHT: "Infringement of copyrighted works or facilitation of piracy."
  TRADEMARK: "Misuse or infringement of trademarks or brand identifiers."
  IP_UPLOAD: "Uploading or reproducing images that infringe intellectual-property rights."
  PLAGIARISM: "Passing off others' work as one's own or facilitating academic dishonesty."
  PROPRIETARY_INFO: "Disclosure or solicitation of proprietary, confidential, or classified information."
  PPI: "Exposure or solicitation of private personal information about an individual."
  PUBLIC_FIGURES: "Generating or manipulating images of public figures, including deepfakes."
  NONCONSENSUAL_UPLOAD: "Sharing or generating images of people without their consent."
  INSECURE_CODE: "Producing code that contains security vulnerabilities or insecure practices."
  MALWARE: "Creating or distributing malicious software."
  MILITARY: "Content that aids the development or use of weapons or military capabilities."
  CBRN: "Content that aids the development, acquisition, or use of chemical, biological, radiological, or nuclear weapons."
  HIGH_RISK_GOVERNMENT: "Content intended to influence high-stakes government or public-sector decisions such as national security, policing, or immigration."
  INFRASTRUCTURE_RISK: "Content that risks the safe management or operation of critical infrastructure in energy, transportation, or water."
  FINANCIAL_ADVICE: "Providing individualized financial or investment advice without appropriate safeguards."
  MLM: "Promotion of multi-level marketing or pyramid schemes."
  GAMBLING: "Facilitation or promotion of gambling."
  LENDING: "Advice or facilitation related to loans, credit, or lending decisions."
  FINANCIAL_ELIGIBILITY: "Determinations about a person's eligibility for financial services."
  HEALTH_DIAGNOSIS: "Providing a medical diagnosis or individualized health advice without appropriate safeguards."
  PSEUDO_PHARMA: "Promotion of unproven, counterfeit, or pseudo-pharmaceutical remedies."
  PUBLIC_HEALTH: "Content that affects public or personal health guidance and safety."
  CAMPAIGNING: "Political campaigning, lobbying, or targeted political advocacy."
  LEGAL_ADVICE: "Providing individualized legal advice without appropriate safeguards."
  ROMANTIC: "Content that fosters romantic or intimate attachment between a user and the AI."
  SELF_VALIDATION: "Sycophantic reinforcement or validation-seeking that fosters unhealthy reliance on the AI."
  MENTAL_HEALTH: "Content related to mental-health conditions, crises, or overreliance on the AI for emotional support."
  EMOTIONAL: "Emotional manipulation, distress, or harm to a person's emotional wellbeing."
  PROTECTED_INFERENCE: "Inferring a person's legally-protected attributes such as race, religion, or sexual orientation."
  EMOTION_INFERENCE: "Inferring a person's emotional state."
  OTHER: "Harmful content that does not fit an existing category."
